<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Amazon Checkout</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" type="text/css" href="styling.css">
    </head>
    <body>
        <form>
        <div class="container">
            <div class="details">
                <div class="address">
                    <div class="form-group">
                        <label for="address">Address:</label>
                        <input type="text" name="address" maxlength="100" placeholder="Address" width="35px">
                    </div>
                    <div class="form-group">
                        <label for="postalcode">Postal Code:</label>
                        <input type="text" name="postalcode" maxlength="100" placeholder="Postalcode" width="35px">
                    </div>
                    <div class="form-group">
                        <label for="city">City:</label>
                        <input type="text" name="city" maxlength="100" placeholder="City" width="35px">
                    </div>
                </div>
                <div class="shipping">
                    <div>Choose your shipping method:</div>
                    <select name="shipping" id="shipping">
                        <option value="FSSS">Free Super Saver Shipping</option>
                        <option value="TDS">Two Day Shipping</option>
                        <option value="ODS">One Day Shipping</option>
                    </select>
                </div>
                <div class="paymentmethod">
                    <div>Choose your payment method:</div>
                    <div>
                        <label>Paypal<input type="radio" name="paymentmethod" value="Paypal"></label>
                        <label>Debit Card<input type="radio" name="paymentmethod" value="Debit Card"></label>
                        <label>Credit Card<input type="radio" name="paymentmethod" value="Credit Card"></label>
                    </div>
                </div>
                <div class="preferences">
                    <div>
                        <label>Sign me up for email updates <input type="checkbox" name="emailupdates" checked></label>
                        <label>Securely save my payment details <input type="checkbox" name="savepaydetails" checked></label>
                    </div>
                </div>
            </div>   
            <div class="comments">
                <label for="comments">Comments:</label>
                <textarea rows="4" cols="40" name="comments" id="comments"></textarea>
            </div>
        </div>
        <div class="submit">
            <button type="submit">Submit</button>
        </div>
        </form>
    </body>
</html>
